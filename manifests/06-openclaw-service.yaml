---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-agent
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-agent
    app.kubernetes.io/component: service
spec:
  selector:
    app.kubernetes.io/name: openclaw-agent
    app.kubernetes.io/component: agent
  ports:
    - name: http-web
      port: 8080
      targetPort: http-web
      protocol: TCP
  type: ClusterIP
