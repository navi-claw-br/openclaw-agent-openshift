---
# Template para secrets — NÃO versionar com valores reais.
# Crie o secret manualmente:
#   oc create secret generic openclaw-secrets \
#     --from-literal=DEEPSEEK_API_KEY=sk-... \
#     --from-literal=MORADOR_ONLINE_MCP_JSON='{"url":"https://.../mcp","transport":"streamable-http"}' \
#     -n openclaw
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-agent
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Preencha com base64:
  # echo -n "sk-real-key" | base64
  DEEPSEEK_API_KEY: ""
  OPENAI_API_KEY: ""
  # MORADOR_ONLINE_MCP_JSON: eyJ1cmwiOiAiaHR0cHM6Ly8uLi4vbWNwIiwgInRyYW5zcG9ydCI6ICJzdHJlYW1hYmxlLWh0dHAifQ==
